<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini App HTML CSS JS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #e0f2fe, #f8fafc);
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }
    button {
      margin: 8px;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }
    #resultado {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Mini App</h1>
    <button onclick="mostrarHora()">Ver hora</button>
    <button onclick="mostrarReceta()">Dar receta</button>
    <button onclick="hacerSuma()">1 + 1</button>
    <div id="resultado">Aquí saldrá el resultado</div>
  </div>

  <script>
    function mostrarHora() {
      const ahora = new Date();
      document.getElementById('resultado').textContent =
        'La hora es: ' + ahora.toLocaleTimeString();
    }

    function mostrarReceta() {
      document.getElementById('resultado').textContent =
        'Receta: mezcla pan, queso y jamón para hacer un sándwich 😎';
    }

    function hacerSuma() {
      document.getElementById('resultado').textContent = '1 + 1 = ' + (1 + 1);
    }
  </script>
</body>
</html>
